# file: k8s/cwvj-devsecops-demo-deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-demo
  labels:
    app: devsecops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-project
  template:
    metadata:
      labels:
        app: devsecops-project
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: devsecops-project
      containers:
        - name: cwvj-devsecops-demo
          image: 907260787494.dkr.ecr.us-east-1.amazonaws.com/devsecops_project:latest
          ports:
            - containerPort: 8080

            
---

# file: k8s/cwvj-devsecops-demo-svc.yaml
apiVersion: v1
kind: Service
metadata:
  name: devsecops-demo-svc
  labels:
    app: devsecops-project
spec:
  type: NodePort
  selector:
    app: devsecops-project
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      nodePort: 31000
